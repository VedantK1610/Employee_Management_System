services: 

  mysql:
    image: mysql:8.0

    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_db

    ports:
      - "3307:3306"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost"
        ]

      interval: 10s
      timeout: 5s
      retries: 5

  flask:
    build: ./backend

    container_name: flask-app

    ports:
      - "5000:5000"

    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: employee_db

    depends_on:
      mysql:
        condition: service_healthy

